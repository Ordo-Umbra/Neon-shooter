// ================================================================
// AUDIO  (Web Audio API — procedurally synthesised, no external files)
// ================================================================
let audioCtx = null;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioContext();
    return audioCtx;
}
function playSound(type) {
    try {
        const ac = getAudioCtx();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        const t = ac.currentTime;
        switch (type) {
            case 'shoot':
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, t);
                osc.frequency.exponentialRampToValueAtTime(440, t + 0.06);
                gain.gain.setValueAtTime(0.07, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                osc.start(t); osc.stop(t + 0.08);
                break;
            case 'enemyDie':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(320, t);
                osc.frequency.exponentialRampToValueAtTime(60, t + 0.15);
                gain.gain.setValueAtTime(0.14, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
                osc.start(t); osc.stop(t + 0.16);
                break;
            case 'bossHit':
                osc.type = 'square';
                osc.frequency.setValueAtTime(160, t);
                osc.frequency.exponentialRampToValueAtTime(70, t + 0.12);
                gain.gain.setValueAtTime(0.18, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
                osc.start(t); osc.stop(t + 0.14);
                break;
            case 'bossDie':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, t);
                osc.frequency.exponentialRampToValueAtTime(28, t + 0.9);
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
                osc.start(t); osc.stop(t + 1.0);
                break;
            case 'hit':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, t);
                osc.frequency.exponentialRampToValueAtTime(80, t + 0.22);
                gain.gain.setValueAtTime(0.28, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                osc.start(t); osc.stop(t + 0.25);
                break;
            case 'shieldHit':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1400, t);
                osc.frequency.exponentialRampToValueAtTime(400, t + 0.14);
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
                osc.start(t); osc.stop(t + 0.16);
                break;
            case 'powerup':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, t);
                osc.frequency.setValueAtTime(660, t + 0.1);
                osc.frequency.setValueAtTime(880, t + 0.2);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.start(t); osc.stop(t + 0.35);
                break;
            case 'levelComplete':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523, t);
                osc.frequency.setValueAtTime(659, t + 0.12);
                osc.frequency.setValueAtTime(784, t + 0.24);
                osc.frequency.setValueAtTime(1047, t + 0.36);
                gain.gain.setValueAtTime(0.22, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
                osc.start(t); osc.stop(t + 0.55);
                break;
            case 'gameover':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(55, t + 0.7);
                gain.gain.setValueAtTime(0.32, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
                osc.start(t); osc.stop(t + 0.8);
                break;
        }
    } catch(e) {}
}

// INPUT

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if(gameState === 'playing') {
        player.x = e.touches[0].clientX - 12;
        player.y = e.touches[0].clientY - 12;
    }
}, {passive:false});

canvas.addEventListener('mousemove', e => {
    if(gameState === 'playing') { player.x = e.clientX-12; player.y = e.clientY-12; }
});

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    lastClickX = e.touches[0].clientX; lastClickY = e.touches[0].clientY;
    handleTap();
}, {passive:false});
canvas.addEventListener('click', e => { lastClickX = e.clientX; lastClickY = e.clientY; handleTap(); });

function handleTap() {
    if(gameState === 'title') {
        if(lastClickY > H*0.78 && lastClickY < H*0.91) { gameState = 'guide'; }
        else { gameState = 'intro'; }
    }
    else if(gameState === 'guide')         { gameState = 'title'; }
    else if(gameState === 'intro')         { startLevel(currentLevelIdx); }
    else if(gameState === 'levelComplete') {
        if(lastClickY > H*0.78 && lastClickY < H*0.91) {
            gameState = 'shop';
        } else if(customizationUnlocked && lastClickY > H*0.62 && lastClickY < H*0.78) {
            gameState = 'customize';
        } else { nextLevel(); }
    }
    else if(gameState === 'shop') {
        const rH = H*0.115, r0 = H*0.315;
        if(lastClickY >= r0 && lastClickY < r0+rH) {
            if(scraps >= 15 && player.hp < player.maxHp) { scraps -= 15; player.hp++; }
        } else if(lastClickY >= r0+rH && lastClickY < r0+2*rH) {
            if(scraps >= 30 && upgrades.fireRate < 2) { scraps -= 30; upgrades.fireRate++; }
        } else if(lastClickY >= r0+2*rH && lastClickY < r0+3*rH) {
            if(scraps >= 50 && upgrades.maxHpBonus < 2) { scraps -= 50; upgrades.maxHpBonus++; player.maxHp = 3 + upgrades.maxHpBonus; }
        } else if(lastClickY >= r0+3*rH && lastClickY < r0+4*rH) {
            if(scraps >= 20 && !upgrades.shieldOnStart) { scraps -= 20; upgrades.shieldOnStart = true; }
        } else if(lastClickY > H*0.82) {
            gameState = 'levelComplete';
        }
    }
    else if(gameState === 'customize') {
        // Row centres: H*0.40 (hull), H*0.52 (color), H*0.64 (engine); rowH = H*0.09
        if(lastClickY >= H*0.34 && lastClickY < H*0.46) {
            shipConfig.hull = (shipConfig.hull + 1) % HULL_NAMES.length;
        } else if(lastClickY >= H*0.46 && lastClickY < H*0.58) {
            shipConfig.color = (shipConfig.color + 1) % SHIP_COLORS.length;
        } else if(lastClickY >= H*0.58 && lastClickY < H*0.73) {
            shipConfig.engine = (shipConfig.engine + 1) % ENGINE_NAMES.length;
        } else if(lastClickY >= H*0.73) {
            gameState = 'levelComplete';
        }
    }
    else if(gameState === 'bossLore') {
        levelBonus = killCount * 3 + 150 + currentLevelIdx * 15;
        score += levelBonus;
        if(currentLevelIdx >= 2) customizationUnlocked = true;
        gameState = 'levelComplete';
    }
    else if(gameState === 'gameover')      { retryLevel(); }
    else if(gameState === 'victory')       { resetGame(); }
}

// ================================================================
// GAME CONTROL
// ================================================================
function resetGame() {
    score = 0; currentLevelIdx = 0; levelStartScore = 0;
    player = { x:W/2-12, y:H*0.82, hp:3, maxHp:3, invincFrames:0, shieldActive:false, rapidTimer:0 };
    bots=[]; bullets=[]; particles=[]; powerups=[]; boss=null;
    killCount=0; bossKilledThisLevel=false; fireTimer=0;
    shipConfig = { hull:0, color:0, engine:0 }; customizationUnlocked = false;
    scraps = 0; screenShake = 0; floatingTexts = [];
    randomEventTimer = 700; activeEventText = ''; activeEventDisplayTimer = 0;
    bonusScrapActive = false; bonusScrapTimer = 0;
    upgrades = { fireRate: 0, maxHpBonus: 0, shieldOnStart: false };
    levelStartedWithShield = false;
    gameState = 'title';
}

function startLevel(idx) {
    levelStartScore = score; killCount = 0; bossKilledThisLevel = false; fireTimer = 0;
    bots=[]; bullets=[]; powerups=[]; boss=null; particles=[];
    player.x = W/2-12; player.y = H*0.82; player.invincFrames = 60;
    player.maxHp = 3 + upgrades.maxHpBonus;
    player.hp = Math.min(player.hp, player.maxHp);
    levelStartedWithShield = upgrades.shieldOnStart;
    if(upgrades.shieldOnStart) { player.shieldActive = true; upgrades.shieldOnStart = false; }
    floatingTexts = [];
    randomEventTimer = 700; activeEventText = ''; activeEventDisplayTimer = 0;
    bonusScrapActive = false; bonusScrapTimer = 0;
    const lvl = LEVELS[idx];
    stars.forEach(s => s.color = lvl.starColor || '#fff');
    if(lvl.boss) {
        boss = Object.assign({}, lvl.boss, { x:W/2-60, y:80, dir:lvl.boss.speed, shootTimer:0 });
    }
    gameState = 'playing';
}

function nextLevel() {
    currentLevelIdx++;
    if(currentLevelIdx >= LEVELS.length) { gameState = 'victory'; }
    else { gameState = 'intro'; }
}

function retryLevel() {
    score = levelStartScore;
    if(levelStartedWithShield) upgrades.shieldOnStart = true;
    const rMaxHp = 3 + upgrades.maxHpBonus;
    player = { x:W/2-12, y:H*0.82, hp:rMaxHp, maxHp:rMaxHp, invincFrames:0, shieldActive:false, rapidTimer:0 };
    bots=[]; bullets=[]; particles=[]; powerups=[]; boss=null;
    killCount=0; bossKilledThisLevel=false; fireTimer=0; floatingTexts=[];
    gameState = 'intro';
}

function checkLevelComplete() {
    if(gameState !== 'playing') return;
    const lvl = LEVELS[currentLevelIdx];
    const done = lvl.boss ? bossKilledThisLevel : (killCount >= lvl.quota);
    if(done) {
        levelBonus = killCount * 3 + (lvl.boss ? 150 : 50) + currentLevelIdx * 15;
        score += levelBonus;
        if(currentLevelIdx >= 2) customizationUnlocked = true; // level 3 is index 2 — parts unlock here
        gameState = 'levelComplete';
        playSound('levelComplete');
    }
}

function maybeDropPowerup(ex, ey) {
    if(Math.random() > 0.13) return;
    const types = ['health','rapid','shield'];
    powerups.push({ x:ex, y:ey, type:types[Math.floor(Math.random()*types.length)], vy:1.4, life:320 });
}

function applyPowerup(type) {
    if(type === 'health') { player.hp = Math.min(player.maxHp, player.hp+1); }
    else if(type === 'rapid') { player.rapidTimer = 600; }
    else if(type === 'shield') { player.shieldActive = true; }
    spawnParticles(player.x+12, player.y+12, type==='health'?'#0f0':type==='rapid'?'#ff0':'#0ff', 18);
    playSound('powerup');
}

function playerHit() {
    if(gameState !== 'playing' || player.invincFrames > 0) return;
    screenShake = 14;
    if(player.shieldActive) {
        player.shieldActive = false; player.invincFrames = 80;
        spawnParticles(player.x+12, player.y+12, '#0ff', 12);
        playSound('shieldHit');
        return;
    }
    player.hp--; player.invincFrames = 120;
    spawnParticles(player.x+12, player.y+12, '#f44', 15);
    playSound('hit');
    if(player.hp <= 0) { gameState = 'gameover'; playSound('gameover'); }
}

function drawPlayerShip(cx, cy, color) {
    const sz = 14;
    ctx.save(); ctx.translate(cx, cy);
    ctx.shadowBlur=18; ctx.shadowColor=color; ctx.fillStyle=color;
    ctx.beginPath();
    switch(shipConfig.hull) {
        case 1: // ANGULAR - bladed swept wings
            ctx.moveTo(0,-sz*1.1); ctx.lineTo(sz*0.7,sz*0.2); ctx.lineTo(sz*0.35,sz*0.75);
            ctx.lineTo(0,sz*0.35); ctx.lineTo(-sz*0.35,sz*0.75); ctx.lineTo(-sz*0.7,sz*0.2);
            break;
        case 2: // WIDE - broad delta wings
            ctx.moveTo(0,-sz*0.85); ctx.lineTo(sz*0.85,sz*0.55); ctx.lineTo(sz*0.45,sz*0.75);
            ctx.lineTo(0,sz*0.45); ctx.lineTo(-sz*0.45,sz*0.75); ctx.lineTo(-sz*0.85,sz*0.55);
            break;
        case 3: // SLEEK - narrow dart
            ctx.moveTo(0,-sz*1.3); ctx.lineTo(sz*0.32,sz*0.2);
            ctx.lineTo(0,sz*0.75); ctx.lineTo(-sz*0.32,sz*0.2);
            break;
        default: // STANDARD - original shape
            ctx.moveTo(0,-sz); ctx.lineTo(sz*0.55,sz*0.65); ctx.lineTo(0,sz*0.25); ctx.lineTo(-sz*0.55,sz*0.65);
    }
    ctx.closePath(); ctx.fill();
    const engCol = ENGINE_COLORS[shipConfig.engine];
    ctx.shadowBlur=12; ctx.shadowColor=engCol; ctx.fillStyle=engCol;
    ctx.beginPath(); ctx.ellipse(0,sz*0.55,sz*0.18,sz*0.12,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawSniperShip(cx, cy, size, color) {
    ctx.save(); ctx.translate(cx+size*0.5, cy+size*0.5);
    ctx.shadowBlur=12; ctx.shadowColor=color; ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(0, -size*0.5); ctx.lineTo(size*0.14, size*0.12);
    ctx.lineTo(size*0.28, size*0.5); ctx.lineTo(-size*0.28, size*0.5);
    ctx.lineTo(-size*0.14, size*0.12);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=16;
    ctx.beginPath(); ctx.rect(-size*0.04, -size*0.66, size*0.08, size*0.26); ctx.fill();
    ctx.shadowBlur=6; ctx.strokeStyle=color; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0, -size*0.08, size*0.12, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
}

function drawDreadnoughtShip(cx, cy, size, color) {
    ctx.save(); ctx.translate(cx+size*0.5, cy+size*0.5);
    ctx.shadowBlur=18; ctx.shadowColor=color; ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(0, -size*0.5); ctx.lineTo(size*0.5, -size*0.28);
    ctx.lineTo(size*0.5, size*0.38); ctx.lineTo(size*0.2, size*0.5);
    ctx.lineTo(-size*0.2, size*0.5); ctx.lineTo(-size*0.5, size*0.38);
    ctx.lineTo(-size*0.5, -size*0.28);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-size*0.5, 0); ctx.lineTo(size*0.5, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-size*0.28, -size*0.5); ctx.lineTo(-size*0.28, size*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( size*0.28, -size*0.5); ctx.lineTo( size*0.28, size*0.5); ctx.stroke();
    ctx.shadowBlur=14; ctx.shadowColor='#f22'; ctx.fillStyle='#f22';
    ctx.beginPath(); ctx.arc(0, 0, size*0.12, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawWraithShip(cx, cy, size, color) {
    ctx.save(); ctx.translate(cx+size*0.5, cy+size*0.5);
    ctx.globalAlpha=0.65;
    ctx.shadowBlur=16; ctx.shadowColor=color; ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(0, -size*0.5);
    ctx.bezierCurveTo(size*0.4,-size*0.25, size*0.45,size*0.15, size*0.18,size*0.5);
    ctx.lineTo(0, size*0.22);
    ctx.lineTo(-size*0.18, size*0.5);
    ctx.bezierCurveTo(-size*0.45,size*0.15, -size*0.4,-size*0.25, 0,-size*0.5);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha=0.9; ctx.shadowBlur=20; ctx.shadowColor='#fff'; ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(0, -size*0.05, size*0.1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawNullifierShip(cx, cy, size, color) {
    ctx.save(); ctx.translate(cx+size*0.5, cy+size*0.5);
    ctx.shadowBlur=16; ctx.shadowColor=color;
    ctx.strokeStyle=color; ctx.lineWidth=size*0.14;
    ctx.beginPath(); ctx.arc(0, 0, size*0.34, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle=color;
    ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(0, 0, size*0.15, 0, Math.PI*2); ctx.fill();
    for(let i=0; i<4; i++) {
        const a=(i/4)*Math.PI*2;
        ctx.beginPath(); ctx.arc(Math.cos(a)*size*0.34, Math.sin(a)*size*0.34, size*0.08, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawBossShip(bx, by, bw, bh, color, shape) {
    ctx.save(); ctx.translate(bx+bw*0.5, by+bh*0.5);
    ctx.shadowBlur=30; ctx.shadowColor=color; ctx.fillStyle=color;

    if(shape === 'gatekeeper') {
        // Hawk/guardian — swept wings with a pointed nose and cockpit
        ctx.beginPath();
        ctx.moveTo(0,-bh*0.5); ctx.lineTo(bw*0.25,-bh*0.15); ctx.lineTo(bw*0.5,bh*0.1);
        ctx.lineTo(bw*0.2,bh*0.5); ctx.lineTo(0,bh*0.28);
        ctx.lineTo(-bw*0.2,bh*0.5); ctx.lineTo(-bw*0.5,bh*0.1); ctx.lineTo(-bw*0.25,-bh*0.15);
        ctx.closePath(); ctx.fill();
        ctx.shadowBlur=16; ctx.shadowColor='#fff'; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.ellipse(0,-bh*0.1,bw*0.07,bh*0.16,0,0,Math.PI*2); ctx.fill();

    } else if(shape === 'bastion') {
        // Fortress — wide armoured hull with side turrets
        ctx.beginPath();
        ctx.moveTo(-bw*0.45,-bh*0.5); ctx.lineTo(bw*0.45,-bh*0.5);
        ctx.lineTo(bw*0.5,bh*0.35); ctx.lineTo(bw*0.28,bh*0.5);
        ctx.lineTo(-bw*0.28,bh*0.5); ctx.lineTo(-bw*0.5,bh*0.35);
        ctx.closePath(); ctx.fill();
        // Side turrets
        ctx.beginPath(); ctx.arc(-bw*0.38,-bh*0.22,bw*0.13,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc( bw*0.38,-bh*0.22,bw*0.13,0,Math.PI*2); ctx.fill();
        // Armour ridge lines
        ctx.strokeStyle=color; ctx.lineWidth=3; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.moveTo(-bw*0.28,-bh*0.5); ctx.lineTo(-bw*0.28,bh*0.1);
        ctx.moveTo( bw*0.28,-bh*0.5); ctx.lineTo( bw*0.28,bh*0.1); ctx.stroke();
        ctx.shadowBlur=18; ctx.shadowColor='#fff'; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(0,bh*0.08,bw*0.08,0,Math.PI*2); ctx.fill();

    } else if(shape === 'herald') {
        // Dark Herald — bat-wing sweep with a void-black core
        ctx.beginPath();
        ctx.moveTo(0,-bh*0.28);
        ctx.bezierCurveTo( bw*0.22,-bh*0.52,  bw*0.62,-bh*0.32,  bw*0.5, bh*0.12);
        ctx.lineTo( bw*0.14,bh*0.5); ctx.lineTo(0,bh*0.32);
        ctx.lineTo(-bw*0.14,bh*0.5); ctx.lineTo(-bw*0.5,bh*0.12);
        ctx.bezierCurveTo(-bw*0.62,-bh*0.32, -bw*0.22,-bh*0.52, 0,-bh*0.28);
        ctx.closePath(); ctx.fill();
        // Void core
        ctx.fillStyle='rgba(0,0,0,0.88)';
        ctx.beginPath(); ctx.arc(0,0,bh*0.22,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=25; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(0,0,bh*0.09,0,Math.PI*2); ctx.fill();

    } else if(shape === 'harbinger') {
        // Void Harbinger — 8 radial spikes around a pulsing core
        for(let i=0; i<8; i++) {
            ctx.save(); ctx.rotate((i/8)*Math.PI*2);
            ctx.beginPath();
            ctx.moveTo(-bw*0.07,0); ctx.lineTo(0,-bh*0.52); ctx.lineTo(bw*0.07,0);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }
        // Dark void shell
        ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.beginPath(); ctx.arc(0,0,bh*0.28,0,Math.PI*2); ctx.fill();
        // Pulsing inner core
        ctx.shadowBlur=35; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(0,0,bh*0.17,0,Math.PI*2); ctx.fill();
        // Outer ring
        ctx.shadowBlur=0; ctx.globalAlpha=0.45;
        ctx.strokeStyle=color; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,0,bh*0.40,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;

    } else if(shape === 'overlord') {
        // The Overlord — massive hull with extended wing fins and weapon pods
        // Central hull
        ctx.beginPath();
        ctx.moveTo(0,-bh*0.5); ctx.lineTo(bw*0.2,-bh*0.3); ctx.lineTo(bw*0.35,bh*0.0);
        ctx.lineTo(bw*0.2,bh*0.5); ctx.lineTo(-bw*0.2,bh*0.5);
        ctx.lineTo(-bw*0.35,bh*0.0); ctx.lineTo(-bw*0.2,-bh*0.3);
        ctx.closePath(); ctx.fill();
        // Left wing fin
        ctx.beginPath();
        ctx.moveTo(-bw*0.2,-bh*0.1); ctx.lineTo(-bw*0.9,-bh*0.28);
        ctx.lineTo(-bw*0.88,bh*0.12); ctx.lineTo(-bw*0.35,bh*0.18);
        ctx.closePath(); ctx.fill();
        // Right wing fin
        ctx.beginPath();
        ctx.moveTo( bw*0.2,-bh*0.1); ctx.lineTo( bw*0.9,-bh*0.28);
        ctx.lineTo( bw*0.88,bh*0.12); ctx.lineTo( bw*0.35,bh*0.18);
        ctx.closePath(); ctx.fill();
        // Core weapon eye
        ctx.shadowBlur=30; ctx.shadowColor='#fff'; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(0,bh*0.08,14,0,Math.PI*2); ctx.fill();
        // Wing weapon pods
        ctx.shadowBlur=14; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(-bw*0.56,bh*0.0,8,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc( bw*0.56,bh*0.0,8,0,Math.PI*2); ctx.fill();

    } else if(shape === 'phantomking') {
        // Phantom King — twin swept blades with a glowing spectral core
        ctx.beginPath();
        ctx.moveTo(0, -bh*0.5);
        ctx.lineTo(bw*0.15, -bh*0.22);
        ctx.lineTo(bw*0.65, -bh*0.45);
        ctx.lineTo(bw*0.48, bh*0.15);
        ctx.lineTo(bw*0.18, bh*0.5);
        ctx.lineTo(0, bh*0.3);
        ctx.lineTo(-bw*0.18, bh*0.5);
        ctx.lineTo(-bw*0.48, bh*0.15);
        ctx.lineTo(-bw*0.65, -bh*0.45);
        ctx.lineTo(-bw*0.15, -bh*0.22);
        ctx.closePath(); ctx.fill();
        // Void core
        ctx.fillStyle='rgba(0,0,0,0.82)';
        ctx.beginPath(); ctx.arc(0, 0, bh*0.22, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur=35; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.1, 0, Math.PI*2); ctx.fill();
        // Outer energy ring
        ctx.globalAlpha=0.4; ctx.strokeStyle=color; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.38, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;

    } else if(shape === 'annihilator') {
        // The Annihilator — colossal dreadnought with dual wing arrays
        // Main hull
        ctx.beginPath();
        ctx.moveTo(0, -bh*0.5);
        ctx.lineTo(bw*0.3, -bh*0.35);
        ctx.lineTo(bw*0.45, bh*0.0);
        ctx.lineTo(bw*0.3, bh*0.5);
        ctx.lineTo(-bw*0.3, bh*0.5);
        ctx.lineTo(-bw*0.45, bh*0.0);
        ctx.lineTo(-bw*0.3, -bh*0.35);
        ctx.closePath(); ctx.fill();
        // Left wing
        ctx.beginPath();
        ctx.moveTo(-bw*0.3, -bh*0.1); ctx.lineTo(-bw*0.95, -bh*0.3);
        ctx.lineTo(-bw*0.9, bh*0.2); ctx.lineTo(-bw*0.45, bh*0.22);
        ctx.closePath(); ctx.fill();
        // Right wing
        ctx.beginPath();
        ctx.moveTo( bw*0.3, -bh*0.1); ctx.lineTo( bw*0.95, -bh*0.3);
        ctx.lineTo( bw*0.9, bh*0.2); ctx.lineTo( bw*0.45, bh*0.22);
        ctx.closePath(); ctx.fill();
        // Wing weapon pods
        ctx.shadowBlur=18; ctx.shadowColor='#fff'; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(-bw*0.62, 0, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc( bw*0.62, 0, 7, 0, Math.PI*2); ctx.fill();
        // Central weapon core
        ctx.shadowBlur=40; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(0, bh*0.1, 16, 0, Math.PI*2); ctx.fill();
        // Dual secondary cores
        ctx.shadowBlur=14;
        ctx.beginPath(); ctx.arc(-bw*0.18, -bh*0.15, 8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc( bw*0.18, -bh*0.15, 8, 0, Math.PI*2); ctx.fill();

    } else if(shape === 'sentinel') {
        // Omega Sentinel — six-pronged star with rotating ring and pulsing core
        for(let i=0; i<6; i++) {
            ctx.save(); ctx.rotate((i/6)*Math.PI*2);
            ctx.beginPath();
            ctx.moveTo(-bw*0.08, 0); ctx.lineTo(0, -bh*0.58); ctx.lineTo(bw*0.08, 0);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }
        // Armour ring
        ctx.fillStyle='rgba(0,0,0,0.80)';
        ctx.beginPath(); ctx.arc(0, 0, bh*0.3, 0, Math.PI*2); ctx.fill();
        // Outer energy ring
        ctx.globalAlpha=0.5; ctx.strokeStyle=color; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.42, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;
        // Inner weapon ring
        ctx.shadowBlur=20; ctx.shadowColor=color; ctx.strokeStyle=color; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.2, 0, Math.PI*2); ctx.stroke();
        // Pulsing core
        ctx.shadowBlur=45; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.12, 0, Math.PI*2); ctx.fill();
        // Weapon pods at alternating prong tips
        ctx.shadowBlur=10;
        for(let i=0; i<3; i++) {
            const a = (i/3)*Math.PI*2 - Math.PI/2;
            ctx.beginPath(); ctx.arc(Math.cos(a)*bh*0.44, Math.sin(a)*bh*0.44, 6, 0, Math.PI*2); ctx.fill();
        }

    } else if(shape === 'titanking') {
        // Titan King — massive armoured colossus with 8 weapon emplacements
        ctx.beginPath();
        ctx.moveTo(0, -bh*0.5);
        ctx.lineTo(bw*0.35, -bh*0.32); ctx.lineTo(bw*0.5, bh*0.02);
        ctx.lineTo(bw*0.32, bh*0.5); ctx.lineTo(-bw*0.32, bh*0.5);
        ctx.lineTo(-bw*0.5, bh*0.02); ctx.lineTo(-bw*0.35, -bh*0.32);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='rgba(0,0,0,0.72)';
        ctx.beginPath(); ctx.arc(0, 0, bh*0.3, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur=14; ctx.shadowColor=color; ctx.fillStyle=color;
        for(let i=0; i<8; i++) {
            const a=(i/8)*Math.PI*2;
            ctx.beginPath(); ctx.arc(Math.cos(a)*bh*0.22, Math.sin(a)*bh*0.22, 7, 0, Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur=32; ctx.shadowColor='#f00'; ctx.fillStyle='#f22';
        ctx.beginPath(); ctx.arc(0, 0, bh*0.1, 0, Math.PI*2); ctx.fill();

    } else if(shape === 'nullifierboss') {
        // The Nullifier — concentric rings with null-field pods
        ctx.lineWidth=10; ctx.strokeStyle=color; ctx.shadowBlur=22;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.48, 0, Math.PI*2); ctx.stroke();
        ctx.lineWidth=6;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.3, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle=color; ctx.shadowBlur=18;
        for(let i=0; i<6; i++) {
            const a=(i/6)*Math.PI*2;
            ctx.beginPath(); ctx.arc(Math.cos(a)*bh*0.48, Math.sin(a)*bh*0.48, 11, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle='rgba(0,0,0,0.90)';
        ctx.beginPath(); ctx.arc(0, 0, bh*0.2, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur=42; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.1, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.4; ctx.strokeStyle=color; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.38, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;

    } else if(shape === 'voidemperor') {
        // Void Emperor — ten-pronged entity with energy rings and void core
        for(let i=0; i<10; i++) {
            ctx.save(); ctx.rotate((i/10)*Math.PI*2);
            ctx.beginPath();
            ctx.moveTo(-bw*0.06, 0); ctx.lineTo(0, -bh*0.58); ctx.lineTo(bw*0.06, 0);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }
        ctx.fillStyle='rgba(0,0,0,0.84)';
        ctx.beginPath(); ctx.arc(0, 0, bh*0.35, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.45; ctx.strokeStyle=color; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.46, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;
        ctx.fillStyle='rgba(0,0,0,0.65)';
        ctx.beginPath(); ctx.arc(0, 0, bh*0.22, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur=52; ctx.shadowColor=color; ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(0, 0, bh*0.13, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur=14;
        for(let i=0; i<5; i++) {
            const a=(i/5)*Math.PI*2 - Math.PI/2;
            ctx.beginPath(); ctx.arc(Math.cos(a)*bh*0.44, Math.sin(a)*bh*0.44, 8, 0, Math.PI*2); ctx.fill();
        }

    } else {
        // Fallback — original shape
        ctx.beginPath();
        ctx.moveTo(0,-bh*0.5); ctx.lineTo(bw*0.45,-bh*0.18); ctx.lineTo(bw*0.5,bh*0.22);
        ctx.lineTo(0,bh*0.5); ctx.lineTo(-bw*0.5,bh*0.22); ctx.lineTo(-bw*0.45,-bh*0.18);
        ctx.closePath(); ctx.fill();
        ctx.shadowBlur=16; ctx.shadowColor='#fff'; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(0,bh*0.1,9,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawPowerup(pu) {
    ctx.save(); ctx.translate(pu.x, pu.y); ctx.shadowBlur=16;
    if(pu.type === 'health') {
        ctx.shadowColor='#0f0'; ctx.fillStyle='#0f0';
        ctx.fillRect(-8,-3,16,6); ctx.fillRect(-3,-8,6,16);
    } else if(pu.type === 'rapid') {
        ctx.shadowColor='#ff0'; ctx.strokeStyle='#ff0'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(3,-10); ctx.lineTo(-3,0); ctx.lineTo(3,0); ctx.lineTo(-3,10); ctx.stroke();
    } else {
        ctx.shadowColor='#0ff'; ctx.strokeStyle='#0ff'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
}

function drawHUD() {
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.font='22px Courier New';
    for(let i=0; i<player.maxHp; i++) {
        ctx.fillStyle = i < player.hp ? '#f44' : '#400';
        ctx.fillText('♥', 15+i*30, 36);
    }
    let buffX = 110;
    if(player.shieldActive)   { ctx.fillStyle='#0ff'; ctx.font='15px Courier New'; ctx.fillText('SHIELD',buffX,36); buffX+=80; }
    if(player.rapidTimer > 0) { ctx.fillStyle='#ff0'; ctx.font='15px Courier New'; ctx.fillText('RAPID', buffX,36); buffX+=70; }
    if(bonusScrapActive)      { ctx.fillStyle='#f0f'; ctx.font='15px Courier New'; ctx.fillText('x2\u2B21', buffX,36); }
    ctx.fillStyle='#0ff'; ctx.font='18px Courier New'; ctx.textAlign='center';
    ctx.fillText('SCORE: '+score, W/2, 30);
    ctx.fillStyle='#888'; ctx.font='13px Courier New';
    ctx.fillText('LVL '+(currentLevelIdx+1)+' — '+LEVELS[currentLevelIdx].name, W/2, 48);
    ctx.textAlign='left';
    ctx.fillStyle='#ff0'; ctx.font='16px Courier New'; ctx.textAlign='right';
    ctx.fillText('\u2B21 '+scraps, W-15, 58);
    ctx.textAlign='left';
    if(LEVELS[currentLevelIdx].quota > 0) {
        ctx.fillStyle='#0f0'; ctx.font='16px Courier New'; ctx.textAlign='right';
        ctx.fillText('KILLS: '+killCount+'/'+LEVELS[currentLevelIdx].quota, W-15, 36);
        ctx.textAlign='left';
    }
}

function drawOverlay(title, titleColor, lines, footer, secondaryBtn) {
    ctx.fillStyle='rgba(0,0,0,0.74)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.shadowBlur=22; ctx.shadowColor=titleColor;
    ctx.fillStyle=titleColor; ctx.font='bold 36px Courier New';
    ctx.fillText(title, W/2, H*0.28);
    ctx.shadowBlur=0; ctx.fillStyle='#ccc'; ctx.font='13px Courier New';
    lines.forEach((l,i) => ctx.fillText(l, W/2, H*0.28+58+i*22));
    if(secondaryBtn) {
        ctx.shadowBlur=14; ctx.shadowColor='#ff0'; ctx.fillStyle='#ff0';
        ctx.font='bold 17px Courier New';
        ctx.fillText(secondaryBtn, W/2, H*0.70);
        ctx.shadowBlur=0;
    }
    ctx.fillStyle='#666'; ctx.font='15px Courier New';
    ctx.fillText(footer, W/2, H-55);
    ctx.textAlign='left';
}

function drawBossLoreScreen() {
    ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.shadowBlur=22; ctx.shadowColor='#f0f'; ctx.fillStyle='#f0f';
    ctx.font='bold 16px Courier New';
    ctx.fillText('— TRANSMISSION INTERCEPTED —', W/2, H*0.20);
    ctx.shadowBlur=28; ctx.shadowColor='#ff0'; ctx.fillStyle='#ff0';
    ctx.font='bold 28px Courier New';
    ctx.fillText(bossLoreHeadline, W/2, H*0.32);
    ctx.shadowBlur=0; ctx.fillStyle='#ccc'; ctx.font='16px Courier New';
    bossLoreLines.forEach((l, i) => ctx.fillText(l, W/2, H*0.46 + i*36));
    ctx.fillStyle='#555'; ctx.font='14px Courier New';
    ctx.fillText('\u25B6  TOUCH OR CLICK TO CONTINUE  \u25C0', W/2, H-55);
    ctx.textAlign='left';
}

}

// ================================================================
// MAIN LOOP
// ================================================================
function loop() {
    const lvl = LEVELS[Math.min(currentLevelIdx, LEVELS.length-1)];
    ctx.fillStyle = lvl.bgTint || 'rgba(0,0,0,0.38)'; ctx.fillRect(0,0,W,H);

    // Starfield (slower on non-playing screens)
    ctx.shadowBlur=0;
    const sSpeed = (gameState==='playing') ? 1 : 0.25;
    for(let s of stars) {
        s.y += s.speed * sSpeed;
        if(s.y > H) { s.y=0; s.x=Math.random()*W; }
        ctx.globalAlpha=s.alpha; ctx.fillStyle=s.color;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // --- NON-PLAYING SCREENS ---
    if(gameState === 'title') {
        drawOverlay('NEON SHOOTER', '#0ff',
            ['— A SPACE ADVENTURE —', '',
             '30 LEVELS  \u00B7  17 ENEMY TYPES  \u00B7  11 BOSSES',
             'TRAVERSE NEBULAE, ASTEROID FIELDS',
             'AND FACE THE OMEGA SENTINEL'],
            '\u25B6  TOUCH OR CLICK TO START  \u25C0');
        ctx.textAlign='center';
        ctx.shadowBlur=14; ctx.shadowColor='#ff8'; ctx.fillStyle='#ff8';
        ctx.font='bold 16px Courier New';
        ctx.fillText('\u2139  ENEMY GUIDE  \u2139', W/2, H*0.84);
        ctx.shadowBlur=0; ctx.textAlign='left';
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'guide') {
        drawGuideScreen();
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'intro') {
        drawOverlay('LEVEL '+(currentLevelIdx+1), '#ff0',
            [lvl.name, '', ...lvl.story],
            '\u25B6  TOUCH OR CLICK TO BEGIN  \u25C0');
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'bossLore') {
        drawBossLoreScreen();
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'levelComplete') {
        drawOverlay('LEVEL COMPLETE', '#0f0',
            [lvl.name, '',
             'ENEMIES DEFEATED: '+killCount,
             'LEVEL BONUS: +'+levelBonus,
             'TOTAL SCORE: '+score,
             '\u2B21 SCRAPS: '+scraps],
            '\u25B6  TOUCH OR CLICK TO CONTINUE  \u25C0',
            customizationUnlocked ? '\u2605  CUSTOMIZE SHIP  \u2605' : null);
        ctx.textAlign='center';
        ctx.shadowBlur=14; ctx.shadowColor='#ff0'; ctx.fillStyle='#ff0';
        ctx.font='bold 16px Courier New';
        ctx.fillText('\u2B21  VISIT SCRAP SHOP  \u2B21', W/2, H*0.84);
        ctx.shadowBlur=0; ctx.textAlign='left';
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'shop') {
        drawShopScreen();
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'customize') {
        drawCustomizeScreen();
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'gameover') {
        drawOverlay('SHIP DESTROYED', '#f44',
            ['LEVEL '+(currentLevelIdx+1)+': '+lvl.name, '',
             'SCORE: '+score,  'KILLS THIS RUN: '+killCount, '',
             'Score resets to start of this level.'],
            '\u25B6  TOUCH OR CLICK TO RETRY  \u25C0');
        requestAnimationFrame(loop); return;
    }
    if(gameState === 'victory') {
        drawOverlay('MISSION COMPLETE', '#ff0',
            ['THE VOID EMPEROR IS DESTROYED.', 'THE GALAXY IS SAVED. YOUR LEGEND IS ETERNAL.', '',
             'FINAL SCORE: '+score, 'ALL 30 LEVELS CLEARED!'],
            '\u25B6  TOUCH OR CLICK TO PLAY AGAIN  \u25C0');
        requestAnimationFrame(loop); return;
    }

    // --- PLAYING ---

    // Screen shake
    let shakeApplied = false;
    if(screenShake > 0) {
        ctx.save();
        ctx.translate((Math.random()-0.5)*screenShake*1.5, (Math.random()-0.5)*screenShake*1.5);
        screenShake = Math.max(0, screenShake - 1.5);
        shakeApplied = true;
    }

    // Particles
    for(let i=particles.length-1; i>=0; i--) {
        const pt=particles[i];
        pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.06; pt.life-=pt.decay;
        if(pt.life<=0) { particles.splice(i,1); continue; }
        ctx.globalAlpha=pt.life; ctx.shadowBlur=5; ctx.shadowColor=pt.color; ctx.fillStyle=pt.color;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    // Player
    if(player.invincFrames > 0) player.invincFrames--;
    if(player.rapidTimer > 0) player.rapidTimer--;
    const showPlayer = player.invincFrames===0 || Math.floor(player.invincFrames/5)%2===0;
    if(showPlayer) {
        if(player.shieldActive) {
            ctx.save(); ctx.shadowBlur=20; ctx.shadowColor='#0ff';
            ctx.strokeStyle='rgba(0,255,255,0.7)'; ctx.lineWidth=2.5;
            ctx.beginPath(); ctx.arc(player.x+12,player.y+12,24,0,Math.PI*2); ctx.stroke();
            ctx.restore();
        }
        drawPlayerShip(player.x+12, player.y+12, player.rapidTimer>0 ? '#ff8' : SHIP_COLORS[shipConfig.color]);
    }
    // Engine trail
    if(showPlayer) {
        const engCol = ENGINE_COLORS[shipConfig.engine];
        if(Math.random() < 0.75) {
            particles.push({ x:player.x+12+(Math.random()-0.5)*5, y:player.y+26,
                vx:(Math.random()-0.5)*0.6, vy:Math.random()*2.5+0.8,
                life:0.65, decay:0.07, r:Math.random()*2.2+0.5, color:engCol });
        }
    }
    ctx.shadowBlur=0;

    // Auto-fire
    fireTimer++;
    // Base cadence: 6 frames (no upgrade), 5 (lv1), 4 (lv2); rapid overrides to 2
    if(fireTimer >= (player.rapidTimer>0 ? 2 : Math.max(3, 6-upgrades.fireRate))) {
        fireTimer=0;
        bullets.push({x:player.x+10, y:player.y-2, v:-18, enemy:false, width:4});
        playSound('shoot');
        if(player.rapidTimer > 0) {
            bullets.push({x:player.x-2,  y:player.y+8, v:-16, vx:-1.8, enemy:false, width:3});
            bullets.push({x:player.x+22, y:player.y+8, v:-16, vx: 1.8, enemy:false, width:3});
        }
    }

    // Boss
    if(boss) {
        boss.x += boss.dir;
        if(boss.x < 0 || boss.x > W-120) boss.dir *= -1;
        drawBossShip(boss.x, boss.y, 120, 90, boss.color, boss.shape);
        ctx.shadowBlur=0;
        // Boss name + HP bar
        ctx.shadowBlur=8; ctx.shadowColor=boss.color;
        ctx.fillStyle=boss.color; ctx.font='bold 14px Courier New'; ctx.textAlign='center';
        ctx.fillText('▼ '+boss.name+' ▼', W/2, 14);
        ctx.shadowBlur=0; ctx.textAlign='left';
        ctx.fillStyle='#300'; ctx.fillRect(W*0.15,18,W*0.7,12);
        ctx.fillStyle='#f00'; ctx.fillRect(W*0.15,18,(boss.hp/boss.maxHp)*W*0.7,12);
        // Boss fires spread shots aimed at player
        boss.shootTimer++;
        if(boss.shootTimer >= boss.fireRate) {
            boss.shootTimer=0;
            const sp = boss.spread || 1;
            for(let si=0; si<sp; si++) {
                const baseA = Math.atan2(player.y+12-(boss.y+80), player.x+12-(boss.x+60));
                const a = baseA + (si-(sp-1)/2)*0.22, spd=5.5;
                bullets.push({x:boss.x+60, y:boss.y+85, v:Math.sin(a)*spd, vx:Math.cos(a)*spd, enemy:true, width:5});
            }
        }
        if(Math.hypot(player.x+12-(boss.x+60), player.y+12-(boss.y+45)) < 65) playerHit();
    }

    // Spawn enemies
    if(Math.random() < (lvl.spawnRate||0) + currentLevelIdx*0.002) spawnEnemy();

    // Random events (non-boss levels only)
    if(!boss && !lvl.boss) {
        if(bonusScrapActive) { bonusScrapTimer--; if(bonusScrapTimer<=0) bonusScrapActive=false; }
        randomEventTimer--;
        if(randomEventTimer <= 0) {
            randomEventTimer = 600 + Math.floor(Math.random()*400);
            const li = currentLevelIdx;
            const evts = ['scout_rush','asteroid_shower','bonus_scrap','enemy_surge','phantom_strike'];
            const evt = evts[Math.floor(Math.random()*evts.length)];
            if(evt === 'scout_rush') {
                for(let i=0;i<5;i++) bots.push({x:Math.random()*(W-50)+10,y:-30,v:3.5+li*0.35,hp:1,maxHp:1,color:'#f44',size:22,type:'scout',drift:(Math.random()-0.5)*1.4,shootTimer:0,flashTimer:0});
                activeEventText='\u26A1 SCOUT RUSH!'; activeEventDisplayTimer=140;
            } else if(evt === 'asteroid_shower') {
                for(let i=0;i<4;i++) bots.push({x:Math.random()*(W-50)+10,y:-30,v:2+li*0.12,hp:6,maxHp:6,color:'#666',size:38,type:'asteroid',drift:(Math.random()-0.5)*0.5,shootTimer:0,flashTimer:0});
                activeEventText='\u2604 ASTEROID SHOWER!'; activeEventDisplayTimer=140;
            } else if(evt === 'bonus_scrap') {
                bonusScrapActive=true; bonusScrapTimer=400;
                activeEventText='\u2605 BONUS SCRAPS x2!'; activeEventDisplayTimer=140;
            } else if(evt === 'phantom_strike') {
                for(let i=0;i<4;i++) bots.push({x:Math.random()*(W-50)+10,y:-30,v:3.0+li*0.22,hp:3,maxHp:3,color:'#0cf',size:30,type:'phantom',drift:(Math.random()-0.5)*2.5,shootTimer:Math.floor(Math.random()*60),flashTimer:0});
                activeEventText='\u{1F47B} PHANTOM STRIKE!'; activeEventDisplayTimer=140;
            } else {
                for(let i=0;i<3;i++) {
                    const t2=['raider','heavy','scout','phantom','marauder'][Math.floor(Math.random()*5)];
                    if(t2==='raider') bots.push({x:Math.random()*(W-50)+10,y:-30,v:2.5+li*0.25,hp:2,maxHp:2,color:'#f80',size:28,type:'raider',drift:(Math.random()-0.5)*0.8,shootTimer:Math.floor(Math.random()*80),flashTimer:0});
                    else if(t2==='heavy') bots.push({x:Math.random()*(W-50)+10,y:-30,v:1.8+li*0.18,hp:4,maxHp:4,color:'#a0f',size:36,type:'heavy',drift:0,shootTimer:Math.floor(Math.random()*60),flashTimer:0});
                    else if(t2==='phantom') bots.push({x:Math.random()*(W-50)+10,y:-30,v:3.0+li*0.22,hp:3,maxHp:3,color:'#0cf',size:30,type:'phantom',drift:(Math.random()-0.5)*2.5,shootTimer:Math.floor(Math.random()*60),flashTimer:0});
                    else if(t2==='marauder') bots.push({x:Math.random()*(W-50)+10,y:-30,v:2.0+li*0.20,hp:5,maxHp:5,color:'#5f0',size:32,type:'marauder',drift:(Math.random()-0.5)*0.6,shootTimer:Math.floor(Math.random()*65),flashTimer:0});
                    else bots.push({x:Math.random()*(W-50)+10,y:-30,v:3.5+li*0.35,hp:1,maxHp:1,color:'#f44',size:22,type:'scout',drift:(Math.random()-0.5)*1.4,shootTimer:0,flashTimer:0});
                }
                activeEventText='\u2620 ENEMY SURGE!'; activeEventDisplayTimer=140;
            }
        }
        if(activeEventDisplayTimer > 0) {
            activeEventDisplayTimer--;
            const alpha = Math.min(1, activeEventDisplayTimer / 30);
            ctx.save(); ctx.textAlign='center'; ctx.globalAlpha=alpha;
            ctx.shadowBlur=24; ctx.shadowColor='#ff0'; ctx.fillStyle='#ff0';
            ctx.font='bold 24px Courier New';
            ctx.fillText(activeEventText, W/2, H*0.5);
            ctx.restore(); ctx.globalAlpha=1; ctx.textAlign='left';
        }
    }

    // Bots
    for(let i=bots.length-1; i>=0; i--) {
        const b=bots[i];
        b.y+=b.v; b.x+=b.drift;
        if(b.type==='raider') {
            b.shootTimer++;
            if(b.shootTimer >= 90-currentLevelIdx*3) {
                b.shootTimer=0;
                const a=Math.atan2(player.y+12-b.y, player.x+12-b.x);
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.8, v:Math.sin(a)*4, vx:Math.cos(a)*4, enemy:true, width:4});
            }
        } else if(b.type==='heavy') {
            b.shootTimer++;
            if(b.shootTimer >= 70-currentLevelIdx*2) {
                b.shootTimer=0;
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.9, v:3.5, enemy:true, width:7});
            }
        } else if(b.type==='phantom') {
            b.shootTimer++;
            if(b.shootTimer >= 72-currentLevelIdx*2) {
                b.shootTimer=0;
                const a=Math.atan2(player.y+12-b.y, player.x+12-b.x);
                const a1=a-0.18, a2=a+0.18;
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.8, v:Math.sin(a1)*5, vx:Math.cos(a1)*5, enemy:true, width:4});
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.8, v:Math.sin(a2)*5, vx:Math.cos(a2)*5, enemy:true, width:4});
            }
        } else if(b.type==='titan') {
            b.shootTimer++;
            if(b.shootTimer >= 95-currentLevelIdx*2) {
                b.shootTimer=0;
                bullets.push({x:b.x+b.size/2-12, y:b.y+b.size*0.9, v:3.0, enemy:true, width:8});
                bullets.push({x:b.x+b.size/2,    y:b.y+b.size*0.9, v:3.0, enemy:true, width:8});
                bullets.push({x:b.x+b.size/2+12, y:b.y+b.size*0.9, v:3.0, enemy:true, width:8});
            }
        } else if(b.type==='marauder') {
            b.shootTimer++;
            if(b.shootTimer >= 65-currentLevelIdx*2) {
                b.shootTimer=0;
                bullets.push({x:b.x+b.size*0.3, y:b.y+b.size*0.8, v:3.5, vx:-1.8, enemy:true, width:6});
                bullets.push({x:b.x+b.size*0.7, y:b.y+b.size*0.8, v:3.5, vx: 1.8, enemy:true, width:6});
            }
        } else if(b.type==='gunship') {
            b.shootTimer++;
            if(b.shootTimer >= 68-currentLevelIdx*2) {
                b.shootTimer=0;
                bullets.push({x:b.x+b.size*0.3, y:b.y+b.size*0.85, v:3.8, enemy:true, width:5});
                bullets.push({x:b.x+b.size*0.5, y:b.y+b.size*0.85, v:3.8, enemy:true, width:5});
                bullets.push({x:b.x+b.size*0.7, y:b.y+b.size*0.85, v:3.8, enemy:true, width:5});
            }
        } else if(b.type==='interceptor') {
            b.shootTimer++;
            if(b.shootTimer >= Math.max(1, 55-currentLevelIdx*2)) {
                b.shootTimer=0;
                const a=Math.atan2(player.y+12-b.y, player.x+12-b.x);
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.8, v:Math.sin(a)*6, vx:Math.cos(a)*6, enemy:true, width:4});
            }
        } else if(b.type==='bomber') {
            b.shootTimer++;
            if(b.shootTimer >= 80-currentLevelIdx*2) {
                b.shootTimer=0;
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.85, v:2.8, enemy:true, width:10, bomb:true});
            }
        } else if(b.type==='sniper') {
            b.shootTimer++;
            if(b.shootTimer >= 110-currentLevelIdx*3) {
                b.shootTimer=0;
                const a=Math.atan2(player.y+12-b.y, player.x+12-b.x);
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.5, v:Math.sin(a)*9, vx:Math.cos(a)*9, enemy:true, width:3});
            }
        } else if(b.type==='dreadnought') {
            b.shootTimer++;
            if(b.shootTimer >= 100-currentLevelIdx*2) {
                b.shootTimer=0;
                for(let si=0;si<5;si++) {
                    const a2=(si-2)*0.28;
                    bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.9, v:Math.sin(a2+Math.PI/2)*3.2, vx:Math.cos(a2+Math.PI/2)*3.2, enemy:true, width:9});
                }
            }
        } else if(b.type==='wraith') {
            b.shootTimer++;
            if(b.shootTimer >= 75-currentLevelIdx*2) {
                b.shootTimer=0;
                const a=Math.atan2(player.y+12-b.y, player.x+12-b.x);
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.8, v:Math.sin(a)*4.5, vx:Math.cos(a)*4.5, enemy:true, width:4});
            }
        } else if(b.type==='vanguard') {
            b.shootTimer++;
            if(b.shootTimer >= 62-currentLevelIdx*2) {
                b.shootTimer=0;
                bullets.push({x:b.x+b.size*0.2, y:b.y+b.size*0.85, v:3.6, vx:-1.2, enemy:true, width:6});
                bullets.push({x:b.x+b.size*0.8, y:b.y+b.size*0.85, v:3.6, vx: 1.2, enemy:true, width:6});
            }
        } else if(b.type==='nullifier') {
            b.shootTimer++;
            if(b.shootTimer >= 80-currentLevelIdx*2) {
                b.shootTimer=0;
                const a=Math.atan2(player.y+12-b.y, player.x+12-b.x);
                bullets.push({x:b.x+b.size/2, y:b.y+b.size*0.5, v:Math.sin(a)*4, vx:Math.cos(a)*4, enemy:true, width:5, home:true});
            }
        }
        if(b.type==='asteroid')      drawAsteroid(b.x,b.y,b.size,b.color);
        else if(b.type==='heavy')    drawHeavyShip(b.x,b.y,b.size,b.color);
        else if(b.type==='titan')    drawTitanShip(b.x,b.y,b.size,b.color);
        else if(b.type==='phantom')  drawPhantomShip(b.x,b.y,b.size,b.color);
        else if(b.type==='marauder') drawMarauderShip(b.x,b.y,b.size,b.color);
        else if(b.type==='drone')    drawDroneShip(b.x,b.y,b.size,b.color);
        else if(b.type==='gunship')  drawGunship(b.x,b.y,b.size,b.color);
        else if(b.type==='interceptor') drawInterceptorShip(b.x,b.y,b.size,b.color);
        else if(b.type==='bomber')   drawBomberShip(b.x,b.y,b.size,b.color);
        else if(b.type==='splitter') drawSplitterShip(b.x,b.y,b.size,b.color);
        else if(b.type==='vanguard') drawVanguardShip(b.x,b.y,b.size,b.color);
        else if(b.type==='sniper')   drawSniperShip(b.x,b.y,b.size,b.color);
        else if(b.type==='dreadnought') drawDreadnoughtShip(b.x,b.y,b.size,b.color);
        else if(b.type==='wraith')   drawWraithShip(b.x,b.y,b.size,b.color);
        else if(b.type==='nullifier') drawNullifierShip(b.x,b.y,b.size,b.color);
        else                         drawEnemyShip(b.x,b.y,b.size,b.color);
        if(b.flashTimer > 0) {
            b.flashTimer--;
            ctx.save(); ctx.globalAlpha = (b.flashTimer/6)*0.6; ctx.shadowBlur=0;
            ctx.fillStyle='#fff';
            ctx.beginPath(); ctx.arc(b.x+b.size*0.5, b.y+b.size*0.5, b.size*0.55, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
        ctx.shadowBlur=0;
        if(Math.hypot(player.x+12-(b.x+b.size/2), player.y+12-(b.y+b.size/2)) < b.size*0.65) {
            spawnParticles(b.x+b.size/2, b.y+b.size/2, b.color, 8);
            playerHit(); bots.splice(i,1); continue;
        }
        if(b.y > H+50) bots.splice(i,1);
    }

    // Power-ups
    for(let i=powerups.length-1; i>=0; i--) {
        const pu=powerups[i];
        pu.y+=pu.vy; pu.life--;
        drawPowerup(pu); ctx.shadowBlur=0;
        if(Math.hypot(player.x+12-pu.x, player.y+12-pu.y) < 26) {
            applyPowerup(pu.type); powerups.splice(i,1);
        } else if(pu.y > H+20 || pu.life<=0) powerups.splice(i,1);
    }

    // Floating texts
    for(let i=floatingTexts.length-1; i>=0; i--) {
        const ft=floatingTexts[i]; ft.y+=ft.vy; ft.life-=ft.decay;
        if(ft.life<=0) { floatingTexts.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha=ft.life; ctx.shadowBlur=6; ctx.shadowColor=ft.color;
        ctx.fillStyle=ft.color; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
        ctx.fillText(ft.text, ft.x, ft.y); ctx.restore();
    }
    ctx.globalAlpha=1; ctx.textAlign='left';

    // Bullets
    for(let i=bullets.length-1; i>=0; i--) {
        const b=bullets[i];
        if(b.home && b.enemy) {
            const dx=player.x+12-b.x, dy=player.y+12-b.y;
            const d=Math.hypot(dx,dy)||1;
            b.vx=(b.vx||0)+dx/d*0.22; b.v=(b.v||0)+dy/d*0.22;
            const spd=Math.hypot(b.vx||0,b.v);
            if(spd>5.5){const s=5.5/spd; b.vx=(b.vx||0)*s; b.v*=s;}
        }
        b.y+=b.v; if(b.vx) b.x+=b.vx;
        ctx.save(); ctx.shadowBlur=10;
        ctx.shadowColor = b.enemy ? '#f0f' : (player.rapidTimer>0 ? '#ff0' : '#0ff');
        ctx.fillStyle = b.enemy ? '#f8f' : '#fff';
        if(b.enemy && b.bomb) { ctx.beginPath(); ctx.arc(b.x,b.y,7,0,Math.PI*2); ctx.fill(); }
        else if(b.enemy) { ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill(); }
        else { ctx.fillRect(b.x,b.y,b.width,15); }
        ctx.restore();

        if(b.enemy && Math.hypot(player.x+12-b.x, player.y+12-b.y) < 18) {
            bullets.splice(i,1); playerHit(); continue;
        }
        let removed=false;
        if(!b.enemy && boss && b.x+b.width>boss.x && b.x<boss.x+120 && b.y>boss.y && b.y<boss.y+90) {
            boss.hp--; bullets.splice(i,1); removed=true;
            if(boss.hp<=0) {
                spawnParticles(boss.x+60,boss.y+45,boss.color,55);
                playSound('bossDie');
                const bsc = 20+currentLevelIdx*3;
                scraps += bsc;
                floatingTexts.push({x:boss.x+60,y:boss.y+45,text:'+'+bsc+'\u2B21',color:'#ff0',life:1.2,decay:0.016,vy:-1.5});
                score += 100+currentLevelIdx*20;
                const lvlDef = LEVELS[currentLevelIdx];
                bossLoreHeadline = lvlDef.boss.name + ' DESTROYED';
                bossLoreLines = lvlDef.bossLore || ['The enemy falls. Move forward.'];
                boss=null; bossKilledThisLevel=true;
                gameState = 'bossLore';
            } else {
                spawnParticles(b.x, b.y, boss.color, 4);
                playSound('bossHit');
            }
        } else if(!b.enemy) {
            for(let bi=bots.length-1; bi>=0; bi--) {
                const bot=bots[bi];
                if(Math.hypot(b.x-bot.x-bot.size/2, b.y-bot.y-bot.size/2) < bot.size*0.65) {
                    bot.hp--; bullets.splice(i,1); removed=true;
                    if(bot.hp<=0) {
                        spawnParticles(bot.x+bot.size/2,bot.y+bot.size/2,bot.color,14);
                        playSound('enemyDie');
                        maybeDropPowerup(bot.x+bot.size/2,bot.y+bot.size/2);
                        const sc=bot.type==='titan'?6:bot.type==='dreadnought'?8:bot.type==='vanguard'?5:bot.type==='heavy'?4:bot.type==='phantom'?3:bot.type==='marauder'?4:bot.type==='splitter'?4:bot.type==='bomber'?5:bot.type==='nullifier'?5:bot.type==='wraith'?3:bot.type==='gunship'?3:bot.type==='sniper'?2:bot.type==='interceptor'?2:bot.type==='raider'?2:bot.type==='asteroid'?3:1;
                        const scFinal = bonusScrapActive ? sc*2 : sc;
                        scraps+=scFinal;
                        floatingTexts.push({x:bot.x+bot.size/2,y:bot.y+bot.size/2,text:'+'+scFinal+'\u2B21'+(bonusScrapActive?' x2':''),color:'#ff0',life:1.0,decay:0.022,vy:-1.4});
                        bots.splice(bi,1);
                        score += bot.type==='titan'?8 : bot.type==='dreadnought'?10 : bot.type==='vanguard'?6 : bot.type==='heavy'?5 : bot.type==='phantom'?4 : bot.type==='marauder'?5 : bot.type==='bomber'?5 : bot.type==='splitter'?5 : bot.type==='nullifier'?5 : bot.type==='wraith'?4 : bot.type==='gunship'?4 : bot.type==='sniper'?3 : bot.type==='interceptor'?3 : bot.type==='raider'?3 : bot.type==='asteroid'?3 : 1;
                        if(bot.type==='splitter') {
                            for(let si=0;si<2;si++) bots.push({x:bot.x+(si-0.5)*bot.size,y:bot.y,v:4.0+currentLevelIdx*0.35,hp:1,maxHp:1,color:'#fa4',size:16,type:'drone',drift:(Math.random()-0.5)*2.2,shootTimer:0,flashTimer:0});
                        }
                        killCount++; checkLevelComplete();
                    } else {
                        bot.flashTimer = 6;
                        spawnParticles(b.x, b.y, '#fff', 3);
                    }
                    break;
                }
            }
        }
        if(!removed && (b.y<-25||b.y>H+25||b.x<-25||b.x>W+25)) bullets.splice(i,1);
    }

    if(shakeApplied) ctx.restore();
    drawHUD();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
