<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; color: #0ff; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; font-size: 20px; text-shadow: 0 0 10px #0ff; }
        
        #victory, #gameover {
            display: none; position: absolute; top: 30%; width: 100%; text-align: center; 
            font-size: 40px; font-weight: bold; z-index: 100;
        }
        #victory { color: #ff0; text-shadow: 0 0 20px #ff0; }
        #gameover { color: #f00; font-size: 50px; text-shadow: 0 0 20px #f00; }
        
        button {
            margin-top: 20px; padding: 15px 30px; font-size: 20px; font-weight: bold;
            background: #0ff; color: #000; border: none; border-radius: 5px; cursor: pointer;
            box-shadow: 0 0 15px #0ff;
        }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="s">0</span> | LEVEL: <span id="lvl">1</span></div>
    
    <div id="victory">GALAXY SAVED!<br><button onclick="location.reload()">PLAY AGAIN</button></div>
    <div id="gameover">SYSTEM FAILURE<br><button onclick="location.reload()">REBOOT</button></div>

    <canvas id="c"></canvas>
    
    <script>
        const c = document.getElementById("c"), x = c.getContext("2d");
        c.width = window.innerWidth; c.height = window.innerHeight;

        // Added 'bossesDefeated' to track our progress through the new longer game!
        let p = { x: c.width/2, y: c.height*0.8, s: 25, fury: 0 }, bots = [], bullets = [];
        let score = 0, boss = null, phase = 'swarm', isGameOver = false, bossesDefeated = 0;

        c.addEventListener("touchmove", (e) => {
            if(isGameOver) return; 
            p.x = e.touches[0].clientX - p.s/2; p.y = e.touches[0].clientY - p.s/2;
            if(Math.random() < 0.4) bullets.push({x: p.x+10, y: p.y, v: -20, enemy: false, width: p.fury > 0 ? 20 : 4});
        });

        // A helper function to spawn different bosses
        function spawnBoss(hp, speed) {
            boss = {x: c.width/2-50, y: 50, hp: hp, maxHp: hp, dir: speed}; 
            phase = 'boss';
        }

        function loop() {
            if(isGameOver) return; 

            x.fillStyle = "rgba(0,0,0,0.3)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle = p.fury > 0 ? "#ff0" : "#0ff"; x.fillRect(p.x, p.y, 25, 25);
            if(p.fury > 0) { x.shadowBlur=20; x.shadowColor="#ff0"; p.fury--; }

            let level = Math.floor(score/50) + 1;
            document.getElementById("lvl").innerText = level;
            
            // INCREASED LENGTH: Victory is now at 500!
            if(score >= 500) { 
                document.getElementById("victory").style.display = "block"; 
                isGameOver = true; return; 
            }

            // TWO BOSS PHASES
            if(score >= 100 && bossesDefeated === 0 && phase === 'swarm') spawnBoss(150, 4); // Boss 1
            if(score >= 300 && bossesDefeated === 1 && phase === 'swarm') spawnBoss(300, 7); // Mega-Boss 2

            if(phase === 'boss' && boss) {
                boss.x += boss.dir; if(boss.x < 0 || boss.x > c.width-100) boss.dir *= -1;
                x.fillStyle = bossesDefeated === 1 ? "#f80" : "#f0f"; // Make the second boss orange!
                x.fillRect(boss.x, boss.y, 100, 80);
                x.fillStyle = "#f00"; x.fillRect(c.width/4, 20, (boss.hp/boss.maxHp)*(c.width/2), 10);
            } 
            else if (phase === 'swarm' && Math.random() < 0.05 + (level*0.01)) {
                // INCREASED DIFFICULTY: Asteroids spawn after Level 2!
                let isAsteroid = level > 2 && Math.random() < 0.2;
                if(isAsteroid) {
                    bots.push({x: Math.random()*c.width, y: -30, v: 2 + level*0.5, hp: 5, color: '#666', size: 35});
                } else {
                    bots.push({x: Math.random()*c.width, y: -30, v: 3 + level, hp: 1, color: '#f00', size: 25});
                }
            }

            bots.forEach((b, i) => {
                b.y += b.v; x.fillStyle=b.color; x.fillRect(b.x, b.y, b.size, b.size);
                
                if(Math.hypot(p.x-b.x, p.y-b.y) < b.size) {
                    document.getElementById("gameover").style.display = "block";
                    isGameOver = true; return;
                }
                if(b.y > c.height) bots.splice(i, 1);
            });

            bullets.forEach((b, i) => {
                b.y += b.v; x.fillStyle = b.enemy ? "#f0f" : "#fff"; x.fillRect(b.x, b.y, b.width, 15);
                
                if (b.enemy && Math.hypot(p.x - b.x, p.y - b.y) < 20) {
                    document.getElementById("gameover").style.display = "block";
                    isGameOver = true; return;
                }
                
                if(!b.enemy && boss && b.x > boss.x && b.x < boss.x+100 && b.y < boss.y+80) {
                    boss.hp--; bullets.splice(i, 1);
                    if(boss.hp <= 0) { 
                        boss=null; phase='swarm'; score+=50; p.fury=500; bossesDefeated++; 
                    }
                } else if (!b.enemy) {
                    bots.forEach((bot, bi) => {
                        if(Math.hypot(b.x-bot.x, b.y-bot.y) < bot.size) { 
                            bot.hp--; bullets.splice(i, 1);
                            if(bot.hp <= 0) {
                                bots.splice(bi, 1); score++; document.getElementById("s").innerText = score; 
                            }
                        }
                    });
                }
                if(b.y < 0) bullets.splice(i, 1);
            });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
